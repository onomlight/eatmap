<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>뭐먹지? 추천 맛집 리스트 - 뭐먹지</title>

    <!-- 스타일시트 -->
    <link rel="stylesheet" type="text/css" href="./CSS/main.css" />
    <link rel="stylesheet" type="text/css" href="./CSS/img.css" />
    <link rel="stylesheet" type="text/css" href="./CSS/list.css" />
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>
    <!-- ===== 상단 네비게이션 ===== -->
    <div id="topmenu">
        <header class="header-top">
            <a href="./01main.html">
                <img id="main-logo" alt="뭐먹지 로고" src="img/logo.png" />
            </a>
            <h3 class="header-slogan" style="text-align:center;">내 취향과 맛집 확인을 위해!</h3>
        </header>

        <div class="srch_area">
            <form name="searchFrom" onsubmit="event.preventDefault();">
                <input type="text" id="s_word" name="query" placeholder="어떤 맛집을 찾으시나요?" />
                <button type="submit">검색</button>
            </form>
        </div>

        <nav>
            <ul id="depth1">
                <div class="mid-menu">
                    <li><a href="./02mapscr.html">나의 현재 위치 맛집</a></li>
                    <li><a href="./04list.html" style="color:var(--main-color); border-bottom: 2px solid var(--main-color);">추천 맛집 찾기</a></li>
                    <li><a href="./05pop.html">맛집 리스트 보기</a></li>
                    <li><a href="./03mapping.html">키워드로 검색하기</a></li>
                </div>
            </ul>
        </nav>
    </div>

    <!-- ===== 메인 컨텐츠 ===== -->
    <div class="main_cen">
        <div class="menu_line2">
            <h2 class="section-title">식감과 맛 조합으로 내 취향 찾기</h2>
        </div>

        <div class="filter-box">
            <form id="recommendForm">
                <!-- 맵기 선택 -->
                <div class="filter-group">
                    <label class="filter-item">
                        <input type="radio" name="spicy" value="매운" required>
                        <img src="./img/spicy.png" alt="매운맛" onerror="this.src='https://via.placeholder.com/80?text=Spicy'">
                    </label>
                    <label class="filter-item">
                        <input type="radio" name="spicy" value="안매운">
                        <img src="./img/mild.png" alt="안매운맛" onerror="this.src='https://via.placeholder.com/80?text=Mild'">
                    </label>
                </div>

                <!-- 온도 선택 -->
                <div class="filter-group">
                    <label class="filter-item">
                        <input type="radio" name="temp" value="따뜻한" required>
                        <img src="./img/warm.png" alt="따뜻한" onerror="this.src='https://via.placeholder.com/80?text=Warm'">
                    </label>
                    <label class="filter-item">
                        <input type="radio" name="temp" value="시원한">
                        <img src="./img/cool.png" alt="시원한" onerror="this.src='https://via.placeholder.com/80?text=Cool'">
                    </label>
                </div>

                <!-- 종류 선택 -->
                <div class="filter-group">
                    <label class="filter-item">
                        <input type="radio" name="type" value="한식" required>
                        <img src="./img/korean.png" alt="한식" onerror="this.src='https://via.placeholder.com/80?text=KOR'">
                    </label>
                    <label class="filter-item">
                        <input type="radio" name="type" value="양식">
                        <img src="./img/western.png" alt="양식" onerror="this.src='https://via.placeholder.com/80?text=WES'">
                    </label>
                    <label class="filter-item">
                        <input type="radio" name="type" value="중식">
                        <img src="./img/chinese.png" alt="중식" onerror="this.src='https://via.placeholder.com/80?text=CHN'">
                    </label>
                    <label class="filter-item">
                        <input type="radio" name="type" value="일식">
                        <img src="./img/japanese.png" alt="일식" onerror="this.src='https://via.placeholder.com/80?text=JPN'">
                    </label>
                </div>

                <!-- 탄수화물 선택 -->
                <div class="filter-group">
                    <label class="filter-item">
                        <input type="radio" name="carb" value="빵" required>
                        <img src="./img/bread.png" alt="빵" onerror="this.src='https://via.placeholder.com/80?text=Bread'">
                    </label>
                    <label class="filter-item">
                        <input type="radio" name="carb" value="밥">
                        <img src="./img/rice.png" alt="밥" onerror="this.src='https://via.placeholder.com/80?text=Rice'">
                    </label>
                    <label class="filter-item">
                        <input type="radio" name="carb" value="면">
                        <img src="./img/noodle.png" alt="면" onerror="this.src='https://via.placeholder.com/80?text=Noodle'">
                    </label>
                    <label class="filter-item">
                        <input type="radio" name="carb" value="떡">
                        <img src="./img/ricecake.png" alt="떡" onerror="this.src='https://via.placeholder.com/80?text=Ricecake'">
                    </label>
                </div>

                <button type="submit" class="btn-search-recommend">추천 맛집 조회하기</button>
                <button type="reset" class="btn-search-recommend" style="background-color:var(--text-muted); margin-left:10px;">다시하기</button>
            </form>
        </div>

        <!-- 추천 결과 표시 영역 -->
        <h3 id="result-title" style="display:none; text-align:center; color:var(--text-dark); margin-bottom:20px;">당신을 위한 추천 맛집입니다!</h3>
        <div class="list-container" id="recommend-result-container">
            <!-- 조회 클릭 시 관련 데이터가 여기에 나타납니다. -->
        </div>
    </div>

    <!-- ===== 푸터 ===== -->
    <footer>
        <div id="footer-menu">
            <span>회사소개 &nbsp;|&nbsp; </span>
            <span>서비스 소개 &nbsp;|&nbsp; </span>
            <span>개인정보처리방침 &nbsp;|&nbsp; </span>
            <span>이용약관 &nbsp;|&nbsp; </span>
            <span>도움말</span>
        </div>
        <div id="info">
            대표 ㅣ 뭐먹지컨텐츠즈<br>
            연락처 | 053-222-5555 &nbsp;&nbsp;&nbsp; 위치 | 대구시 중구 중앙대로 999
        </div>
        <div id="sns">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16"><path d="M8 0C5.829 0 5.556.01 4.703.048 3.85.088 3.269.222 2.76.42a3.917 3.917 0 0 0-1.417.923A3.927 3.927 0 0 0 .42 2.76C.222 3.268.087 3.85.048 4.7.01 5.555 0 5.827 0 8.001c0 2.172.01 2.444.048 3.297.04.852.174 1.433.372 1.942.205.526.478.972.923 1.417.444.445.89.719 1.416.923.51.198 1.09.333 1.942.372C5.555 15.99 5.827 16 8 16s2.444-.01 3.298-.048c.851-.04 1.434-.174 1.943-.372a3.916 3.916 0 0 0 1.416-.923c.445-.445.718-.891.923-1.417.197-.509.332-1.09.372-1.942C15.99 10.445 16 10.173 16 8s-.01-2.445-.048-3.299c-.04-.851-.175-1.433-.372-1.941a3.926 3.926 0 0 0-.923-1.417A3.911 3.911 0 0 0 13.24.42c-.51-.198-1.092-.333-1.943-.372C10.443.01 10.172 0 7.998 0h.003zm-.717 1.442h.718c2.136 0 2.389.007 3.232.046.78.035 1.204.166 1.486.275.373.145.64.319.92.599.28.28.453.546.598.92.11.281.24.705.275 1.485.039.843.047 1.096.047 3.231s-.008 2.389-.047 3.232c-.035.78-.166 1.203-.275 1.485a2.47 2.47 0 0 1-.599.919c-.28.28-.546.453-.92.598-.28.11-.704.24-1.485.276-.843.038-1.096.047-3.232.047s-2.39-.009-3.233-.047c-.78-.036-1.203-.166-1.485-.276a2.478 2.478 0 0 1-.92-.598 2.48 2.48 0 0 1-.6-.92c-.109-.281-.24-.705-.275-1.485-.038-.843-.046-1.096-.046-3.233 0-2.136.008-2.388.046-3.231.036-.78.166-1.204.276-1.486.145-.373.319-.64.599-.92.28-.28.546-.453.92-.598.282-.11.705-.24 1.485-.276.738-.034 1.024-.044 2.515-.045v.002zm4.988 1.328a.96.96 0 1 0 0 1.92.96.96 0 0 0 0-1.92zm-4.27 1.122a4.109 4.109 0 1 0 0 8.217 4.109 4.109 0 0 0 0-8.217zm0 1.441a2.667 2.667 0 1 1 0 5.334 2.667 2.667 0 0 1 0-5.334z"/></svg>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16"><path d="M8.051 1.999h.089c.822.003 4.987.033 6.11.335a2.01 2.01 0 0 1 1.415 1.42c.101.38.172.883.22 1.402l.01.104.022.26.008.104c.065.914.073 1.77.074 1.957v.075c-.001.194-.01 1.108-.082 2.06l-.008.105-.009.104c-.05.572-.124 1.14-.235 1.558a2.007 2.007 0 0 1-1.415 1.42c-1.16.312-5.569.334-6.18.335h-.142c-.309 0-1.587-.006-2.927-.052l-.17-.006-.087-.004-.171-.007-.171-.007c-1.11-.049-2.167-.128-2.654-.26a2.007 2.007 0 0 1-1.415-1.419c-.111-.417-.185-.986-.235-1.558L.09 9.82l-.008-.104A31.4 31.4 0 0 1 0 7.68v-.123c.002-.215.01-.958.064-1.778l.007-.103.003-.052.008-.104.022-.26.01-.104c.048-.519.119-1.023.22-1.402a2.007 2.007 0 0 1 1.415-1.42c.487-.13 1.544-.21 2.654-.26l.17-.007.172-.006.086-.003.171-.007A99.788 99.788 0 0 1 7.858 2h.193zM6.4 5.209v4.818l4.157-2.408L6.4 5.209z"/></svg>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16"><path d="M5.026 15c6.038 0 9.341-5.003 9.341-9.334 0-.14 0-.282-.006-.422A6.685 6.685 0 0 0 16 3.542a6.658 6.658 0 0 1-1.889.518 3.301 3.301 0 0 0 1.447-1.817 6.533 6.533 0 0 1-2.087.793A3.286 3.286 0 0 0 7.875 6.03a9.325 9.325 0 0 1-6.767-3.429 3.289 3.289 0 0 0 1.018 4.382A3.323 3.323 0 0 1 .64 6.575v.045a3.288 3.288 0 0 0 2.632 3.218 3.203 3.203 0 0 1-.865.115 3.23 3.23 0 0 1-.614-.057 3.283 3.283 0 0 0 3.067 2.277A6.588 6.588 0 0 1 .78 13.58a6.32 6.32 0 0 1-.78-.045A9.344 9.344 0 0 0 5.026 15z"/></svg>
        </div>
    </footer>

    <script>
        $(document).ready(function() {
            var restaurantsData = [];

            // data.json 로드
            $.getJSON("./data.json", function(data) {
                restaurantsData = data;
            });

            $("#recommendForm").submit(function(e) {
                e.preventDefault();
                
                var spicy = $("input[name='spicy']:checked").val();
                var temp = $("input[name='temp']:checked").val();
                var type = $("input[name='type']:checked").val();
                var carb = $("input[name='carb']:checked").val();

                if (!spicy || !temp || !type || !carb) {
                    alert('4가지 조합을 모두 선택해주세요!');
                    return;
                }

                // 각 선택지에 따른 검색 키워드 매핑
                var queryKeywords = [];
                
                if (spicy === '매운') queryKeywords.push('매운', '불', '매콤', '얼큰', '짬뽕', '찜', '마라');
                else if (spicy === '안매운') queryKeywords.push('순한', '담백', '맑은', '달콤', '크림');
                
                if (temp === '따뜻한') queryKeywords.push('탕', '국', '찌개', '전골', '따뜻', '국밥', '철판', '구이');
                else if (temp === '시원한') queryKeywords.push('냉', '시원', '빙수', '물회', '초밥', '샐러드');

                if (type) queryKeywords.push(type);

                if (carb === '빵') queryKeywords.push('빵', '샌드위치', '베이커리', '토스트', '버거', '피자');
                else if (carb === '밥') queryKeywords.push('밥', '국밥', '덮밥', '볶음밥', '리조또', '비빔밥');
                else if (carb === '면') queryKeywords.push('면', '국수', '파스타', '스파게티', '우동', '소바');
                else if (carb === '떡') queryKeywords.push('떡', '떡볶이', '찰떡');

                // data.json을 바탕으로 스코어링 (점수 부여)를 통한 추천 알고리즘
                restaurantsData.forEach(function(item) {
                    let score = 0;
                    let textToSearch = ((item.FD_CS || '') + " " + (item.MNU || '') + " " + (item.SMPL_DESC || '')).toLowerCase();
                    
                    queryKeywords.forEach(function(kw) {
                        if (textToSearch.includes(kw)) {
                            score += 1; // 키워드가 포함될 때마다 점수 추가
                        }
                    });
                    
                    // 핵심 조건(음식 타입)이 일치하면 대폭 보너스
                    if (item.FD_CS && item.FD_CS.includes(type)) {
                        score += 3; 
                    }
                    
                    item._score = score; // 임시 저장
                });

                // 점수 기반 정렬 후 점수가 0보단 큰 곳만 필터링
                var filtered = restaurantsData.filter(function(item) { return item._score > 0; });
                filtered.sort(function(a, b) { return b._score - a._score; });

                // 만약 결과가 없으면 임의로 몇 개 뽑아오기 (fallback)
                if (filtered.length === 0 && restaurantsData.length > 0) {
                    filtered = restaurantsData.slice(0, 3);
                }

                var container = $("#recommend-result-container");
                container.empty();
                
                if (filtered.length > 0) {
                    $("#result-title").show();
                    // 상위 최대 12개까지만 노출
                    for (let i = 0; i < Math.min(filtered.length, 12); i++) {
                        let item = filtered[i];
                        // 1~8.jpg 임의 이미지 사용
                        let imgNum = (i % 8) + 1;
                        let cardHtml = `
                            <div class="list-card">
                                <img src="./img/${imgNum}.jpg" alt="${item.BZ_NM}" onerror="this.src='https://via.placeholder.com/300x200?text=Food'">
                                <div class="card-info">
                                    <h3>${item.BZ_NM}</h3>
                                    <p>${item.GNG_CS}</p>
                                </div>
                            </div>
                        `;
                        container.append(cardHtml);
                    }
                } else {
                    container.html("<p style='text-align:center; padding: 20px; width:100%; color:var(--text-muted);'>추천 결과가 없습니다. 다시 시도해주세요.</p>");
                }
            });

            $("#recommendForm").on("reset", function() {
                $("#recommend-result-container").empty();
                $("#result-title").hide();
            });
        });
    </script>
</body>
</html>
