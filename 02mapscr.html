    <meta property="og:url" content="https://onomlight.github.io/eatmap/" />

    <!-- Favicon -->

    <!-- 스타일시트 -->
    <link rel="stylesheet" type="text/css" href="./CSS/main.css" />

    <!-- 카카오맵 커스텀 스타일 (필요시 추가) -->

        .map_wrap {

            border-radius: var(--radius-md);

    <!-- jQuery -->

</head>

<body>
    <!-- ===== 상단 네비게이션 ===== -->
    <div id="topmenu">
        <header class="header-top">
            <a href="./01main.html">
                <img id="main-logo" alt="뭐먹지 로고" src="img/logo.png" />
            </a>
            <h3>내 취향과 맛집 확인을 위해!</h3>
        </header>

        <div class="srch_area">
            <form name="searchFrom" onsubmit="event.preventDefault();">
                <input type="text" id="s_word" name="query" placeholder="어떤 맛집을 찾으시나요?" />
                <button type="submit">검색</button>
            </form>
        </div>

        <nav>
            <ul id="depth1">
                <div class="mid-menu">
                    <li><a href="./02mapscr.html" style="color:var(--main-color); border-bottom: 2px solid var(--main-color);">나의 현재 위치</a></li>
                    <li><a href="./04list.html">맞춤 추천 (뭐먹지?)</a></li>
                    <li><a href="./05pop.html">인기 맛집 리스트</a></li>
                    <li><a href="./03mapping.html">키워드로 검색하기</a></li>
                    <li><a href="./06wish.html">나의 찜 목록</a></li>
                </div>
            </ul>
        </nav>
    </div>

    <!-- ===== 메인 컨텐츠 ===== -->
    <div class="main_cen">
        <div class="menu_line2">
            <h2 class="section-title">나의 현재 위치 맛집!!</h2>
        </div>

        <div class="map_wrap">
            <div id="map" style="width:100%;height:100%;"></div>
        </div>

        <div class="menu_line2" style="margin-top: 50px;">
            <h2 class="section-title">근처 맛집 둘러보기</h2>
        </div>
        <div class="pop-container" id="nearby-list-container">
            <!-- 자바스크립트를 통해 data.json 의 데이터가 동적으로 렌더링 됩니다. -->
        </div>
    </div>

    <!-- ===== 푸터 ===== -->
    <footer>
        <div id="footer-menu">
            <span>회사소개 &nbsp;|&nbsp; </span>
            <span>서비스 소개 &nbsp;|&nbsp; </span>
            <span>개인정보처리방침 &nbsp;|&nbsp; </span>
            <span>이용약관 &nbsp;|&nbsp; </span>
            <span>도움말</span>
        </div>
        <div id="info">
            대표 ㅣ 뭐먹지컨텐츠즈<br>
            연락처 | 053-222-5555 &nbsp;&nbsp;&nbsp; 위치 | 대구시 중구 중앙대로 999
        </div>
        <div id="sns">

        </div>
    </footer>

    <!-- ===== 스크립트 ===== -->
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=1f78091e886236c7d30ebe98181dd94f&libraries=services,clusterer"></script>
    <script src="./JS/app.js"></script>
    <script>
        $(document).ready(function() {
            // data.json 비동기 호출
            $.getJSON("./data.json", function(data) {
                var container = $("#nearby-list-container");
                // 주변 맛집 컨셉으로 랜덤하게 8개 정도만 노출 (섞기)
                let shuffled = data.sort(() => 0.5 - Math.random());
                var maxItems = Math.min(shuffled.length, 8);

                for (let i = 0; i < maxItems; i++) {
                    let item = shuffled[i];
                    let rating = (Math.random() * (5.0 - 4.0) + 4.0).toFixed(1);
                    let cardHtml = `
                        <div class="pop-card">
                            <button class="wish-btn" data-name="${item.BZ_NM}">
                                <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                            </button>
                            <div class="pop-image-area" style="background: #f0f0f0; display: flex; align-items: center; justify-content: center; height: 200px;">
                                <img src="img/logo.png" style="width: 80px; opacity: 0.3; object-fit: contain;" alt="뭐먹지 로고">
                            </div>
                            <div class="pop-content">
                                <div class="pop-header">
                                    <h2 class="pop-title">${item.BZ_NM}</h2>
                                    <div class="pop-rating">★★★★★ <span style="color:var(--text-muted); font-size:1rem;">(${rating})</span></div>
                                </div>
                                <ul class="pop-info">
                                    <li><strong>분류</strong> <span class="card-tag">${item.FD_CS}</span></li>
                                    <li><strong>메뉴</strong> ${item.MNU}</li>
                                    <li><strong>위치</strong> ${item.GNG_CS}</li>
                                    <li><strong>매장소개</strong> ${item.SMPL_DESC}</li>
                                </ul>
                                <div class="pop-footer" style="margin-top:auto;">
                                    <a href="https://map.kakao.com/link/search/${encodeURIComponent(item.BZ_NM)}" target="_blank" class="btn-search-recommend" style="display:inline-block; text-decoration:none; text-align:center; width:100%; box-sizing:border-box;">길찾기 / 지도보기</a>
                                </div>
                            </div>
                        </div>
                    `;
                    container.append(cardHtml);
                }
                // 찜 상태 업데이트
                if (typeof updateWishStatus === 'function') updateWishStatus();
            }).fail(function() {
                $("#nearby-list-container").html("<p style='text-align:center; padding: 50px;'>데이터를 불러오는데 실패했습니다.</p>");
            });
        });
    </script>
</body>
</html>
