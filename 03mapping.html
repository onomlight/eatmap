<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>키워드로 검색하기 - eatmap</title>

    <!-- SEO 및 소셜 공유 설정 -->
    <meta name="description" content="전국 맛집 검색 및 추천 서비스 eatmap - 내 취향에 맞는 맛집을 찾아보세요!" />
    <meta name="keywords" content="맛집, 맛집추천, 전국맛집, 대구맛집, 뭐먹지, eatmap, 맛집지도" />
    <meta name="author" content="onomlight" />

    <!-- Open Graph (카카오톡, 페이스북 공유용) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="eatmap - 취향 저격 맛집 찾기" />
    <meta property="og:description" content="오늘 뭐 먹지? 내 취향과 위치를 기반으로 최고의 맛집을 추천해드립니다." />
    <meta property="og:image" content="https://onomlight.github.io/eatmap/img/logo.png" />
    <meta property="og:url" content="https://onomlight.github.io/eatmap/" />

    <!-- Favicon -->
    <link rel="icon" href="./img/logo.png" type="image/png" />

    <!-- 스타일시트 -->
    <link rel="stylesheet" type="text/css" href="./CSS/main.css" />
    
    <!-- 카카오맵 키워드 검색 커스텀 스타일 -->
    <style>
        .map_wrap {
            position: relative;
            width: 100%;
            height: 600px;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            margin-bottom: 40px;
        }

        #menu_wrap {
            position: absolute;
            top: 20px;
            left: 20px;
            bottom: 20px;
            width: 300px;
            padding: 15px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.95);
            z-index: 10;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
        }

        .option form {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .option input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            outline: none;
        }
        
        .option input:focus {
            border-color: var(--main-color);
        }

        .option button {
            padding: 8px 15px;
            background-color: var(--main-color);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .option button:hover {
            background-color: var(--hover-color);
        }

        #menu_wrap hr {
            border: 0;
            border-top: 1px solid var(--border-light);
            margin: 0 0 10px 0;
        }

        #placesList { padding: 0; margin: 0; }
        #placesList .item {
            position: relative;
            border-bottom: 1px solid var(--border-light);
            padding: 15px 0 15px 45px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #placesList .item:hover {
            background-color: #f0f9fa;
        }

        #placesList {
            margin: 0;
            padding: 0;
            list-style: none;
        }

        #placesList .item {
            position: relative;
            padding: 15px;
            border-bottom: 1px solid var(--border-light);
            cursor: pointer;
            transition: background 0.2s ease;
        }

        #placesList .item:hover {
            background-color: #f8f9fa;
        }

        #placesList .item h5 {
            font-size: 16px;
            color: var(--main-color);
            margin-bottom: 5px;
            font-weight: 700;
            padding-right: 30px; /* 찜 버튼 공간 */
        }

        #placesList .item .info {
            font-size: 13px;
            color: var(--text-dark);
        }

        #placesList .info .gray { color: #888; margin-top: 2px; display: block; }
        #placesList .info .tel { color: #555; font-size: 12px; margin-top: 3px; }

        #placesList .item .wish-btn {
            top: 10px;
            right: 0px;
            width: 30px;
            height: 30px;
            box-shadow: none;
            background: transparent;
        }

        #placesList .item .wish-btn svg {
            width: 18px;
            height: 18px;
        }

        .markerbg {
            display: inline-block;
            width: 20px;
            height: 20px;
            background: var(--main-color);
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 20px;
            font-size: 11px;
            font-weight: bold;
            margin-right: 8px;
            vertical-align: middle;
        }

        /* Pagination... 간단히 */
        #pagination {
            margin: 20px auto 0;
            text-align: center;
        }
        #pagination a { margin: 0 5px; color: var(--text-muted); cursor: pointer; }
        #pagination .on { font-weight: bold; color: var(--main-color); }
        
        /* 마커 스프라이트 속성 반복 생략 (기존 JS 로직이 클래스 제어) */
        .marker_1 {background-position: 0 -10px;}
        .marker_2 {background-position: 0 -56px;}
        .marker_3 {background-position: 0 -102px;}
        .marker_4 {background-position: 0 -148px;}
        .marker_5 {background-position: 0 -194px;}
        .marker_6 {background-position: 0 -240px;}
        .marker_7 {background-position: 0 -286px;}
        .marker_8 {background-position: 0 -332px;}
        .marker_9 {background-position: 0 -378px;}
        .marker_10 {background-position: 0 -423px;}
        .marker_11 {background-position: 0 -470px;}
        .marker_12 {background-position: 0 -516px;}
        .marker_13 {background-position: 0 -562px;}
        .marker_14 {background-position: 0 -608px;}
        .marker_15 {background-position: 0 -654px;}
        
        @media (max-width: 768px) {
            #menu_wrap {
                position: relative;
                top: 0; left: 0; width: 100%; height: 300px;
                border-radius: 0 0 var(--radius-md) var(--radius-md);
            }
            .map_wrap { height: auto; display: flex; flex-direction: column; }
            #map { height: 400px; }
        }
    </style>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="./JS/main.js"></script>
</head>

<body>
    <!-- ===== 상단 네비게이션 ===== -->
    <div id="topmenu">
        <header class="header-top">
            <a href="./01main.html">
                <img id="main-logo" alt="뭐먹지 로고" src="img/logo.png" />
            </a>
            <h3>내 취향과 맛집 확인을 위해!</h3>
        </header>

        <div class="srch_area">
            <form name="searchFrom" onsubmit="event.preventDefault();">
                <input type="text" id="s_word" name="query" placeholder="어떤 맛집을 찾으시나요?" />
                <button type="submit">검색</button>
            </form>
        </div>

        <nav>
            <ul id="depth1">
                <div class="mid-menu">
                    <li><a href="./02mapscr.html">나의 현재 위치</a></li>
                    <li><a href="./04list.html">맞춤 추천 (뭐먹지?)</a></li>
                    <li><a href="./05pop.html">인기 맛집 리스트</a></li>
                    <li><a href="./03mapping.html" style="color:var(--main-color); border-bottom: 2px solid var(--main-color);">키워드로 검색하기</a></li>
                    <li><a href="./06wish.html">나의 찜 목록</a></li>
                </div>
            </ul>
        </nav>
    </div>

    <!-- ===== 메인 컨텐츠 ===== -->
    <div class="main_cen">
        <div class="menu_line2">
            <h2 class="section-title">키워드로 맛집 검색하기</h2>
        </div>

        <div class="map_wrap">
            <div id="map" style="width:100%;height:100%; min-height:400px;"></div>

            <!-- 사이드바 검색창 -->
            <div id="menu_wrap">
                <div class="option">
                    <form onsubmit="searchPlaces(); return false;">
                        <input type="text" value="반월당 맛집" id="keyword" placeholder="검색어 입력">
                        <button type="submit">검색</button>
                    </form>
                </div>
                <hr>
                <ul id="placesList"></ul>
                <div id="pagination"></div>
            </div>
        </div>
    </div>

    <!-- ===== 푸터 ===== -->
    <footer>
        <div id="footer-menu">
            <span>회사소개 &nbsp;|&nbsp; </span>
            <span>서비스 소개 &nbsp;|&nbsp; </span>
            <span>개인정보처리방침 &nbsp;|&nbsp; </span>
            <span>이용약관 &nbsp;|&nbsp; </span>
            <span>도움말</span>
        </div>
        <div id="info">
            대표 ㅣ 뭐먹지컨텐츠즈<br>
            연락처 | 053-222-5555 &nbsp;&nbsp;&nbsp; 위치 | 대구시 중구 중앙대로 999
        </div>

        </div>
    </footer>

    <!-- 카카오맵 스크립트 -->
