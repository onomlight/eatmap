<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맛집 - 부딪히는 포크와 숟가락</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .fork, .spoon {
            position: absolute;
            animation: slide-in 1s ease-out forwards;
        }
        
        .fork {
            left: -300px;
            transform: rotate(-45deg);
            animation: fork-slide 1s ease-out forwards, fork-shake 0.4s 1s forwards;
        }
        
        .spoon {
            right: -300px;
            transform: rotate(45deg);
            animation: spoon-slide 1s ease-out forwards, spoon-shake 0.4s 1s forwards;
        }
        
        @keyframes fork-slide {
            to {
                left: calc(50% - 100px);
                transform: rotate(15deg);
            }
        }
        
        @keyframes spoon-slide {
            to {
                right: calc(50% - 100px);
                transform: rotate(-15deg);
            }
        }
        
        @keyframes fork-shake {
            0% { transform: rotate(15deg) scale(1); opacity: 1; }
            25% { transform: rotate(0deg) scale(1.2); opacity: 1; }
            50% { transform: rotate(25deg) scale(1); opacity: 1; }
            75% { transform: rotate(5deg) scale(0.8); opacity: 0.5; }
            100% { transform: rotate(15deg) scale(0.5); opacity: 0; }
        }
        
        @keyframes spoon-shake {
            0% { transform: rotate(-15deg) scale(1); opacity: 1; }
            25% { transform: rotate(0deg) scale(1.2); opacity: 1; }
            50% { transform: rotate(-25deg) scale(1); opacity: 1; }
            75% { transform: rotate(-5deg) scale(0.8); opacity: 0.5; }
            100% { transform: rotate(-15deg) scale(0.5); opacity: 0; }
        }
        
        .collision-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: collision 0.6s 1s ease-in-out forwards;
            opacity: 0;
        }
        
        @keyframes collision {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(2); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
        }
        
        .sparkle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            animation: sparkle-anim 0.5s 1s forwards;
            opacity: 0;
        }
        
        @keyframes sparkle-anim {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.5) rotate(180deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0) rotate(360deg); opacity: 0; }
        }
        
        .logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            animation: logo-appear 0.6s 1.3s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }
        
        @keyframes logo-appear {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            60% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        .underline {
            width: 0;
            animation: underline-grow 0.5s 1.8s forwards;
        }
        
        @keyframes underline-grow {
            to { width: 100%; }
        }
        
        .subtitle {
            opacity: 0;
            transform: translateY(10px);
            animation: subtitle-appear 0.5s 2.1s forwards;
        }
        
        @keyframes subtitle-appear {
            to { opacity: 1; transform: translateY(0); }
        }
        
        .star {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #FBBF24;
            border-radius: 50%;
            animation: star-twinkle 0.8s infinite;
        }
        
        @keyframes star-twinkle {
            0%, 100% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1); opacity: 1; }
        }

        /* 페이지 전환 페이드아웃 */
        .fade-out {
            animation: page-fade-out 0.8s ease-in forwards;
        }
        @keyframes page-fade-out {
            to { opacity: 0; transform: scale(1.05); }
        }

        /* 클릭 유도 텍스트 */
        .click-hint {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            animation: hint-appear 0.5s 2.5s forwards, hint-pulse 1.5s 3s infinite;
            font-size: 14px;
            color: #c2854a;
            letter-spacing: 2px;
        }
        @keyframes hint-appear {
            to { opacity: 0.7; }
        }
        @keyframes hint-pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-orange-50 to-amber-50">
    <div id="intro-wrapper" style="width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer;">
        
        <!-- 포크 캐릭터 -->
        <div class="fork">
            <svg width="120" height="120" viewBox="0 0 120 120" fill="none">
                <rect x="50" y="50" width="20" height="50" rx="3" fill="#E67E22" />
                <rect x="45" y="20" width="6" height="35" rx="3" fill="#E67E22" />
                <rect x="57" y="20" width="6" height="35" rx="3" fill="#E67E22" />
                <rect x="69" y="20" width="6" height="35" rx="3" fill="#E67E22" />
                <circle cx="55" cy="65" r="3" fill="#2C3E50" />
                <circle cx="65" cy="65" r="3" fill="#2C3E50" />
                <path d="M 52 72 Q 60 78 68 72" stroke="#2C3E50" stroke-width="2" stroke-linecap="round" fill="none" />
                <circle cx="47" cy="68" r="4" fill="#FF6B6B" opacity="0.4" />
                <circle cx="73" cy="68" r="4" fill="#FF6B6B" opacity="0.4" />
            </svg>
        </div>

        <!-- 숟가락 캐릭터 -->
        <div class="spoon">
            <svg width="120" height="120" viewBox="0 0 120 120" fill="none">
                <ellipse cx="60" cy="35" rx="18" ry="22" fill="#3498DB" />
                <rect x="52" y="55" width="16" height="45" rx="3" fill="#3498DB" />
                <circle cx="55" cy="32" r="3" fill="#2C3E50" />
                <circle cx="65" cy="32" r="3" fill="#2C3E50" />
                <path d="M 52 40 Q 60 46 68 40" stroke="#2C3E50" stroke-width="2" stroke-linecap="round" fill="none" />
                <circle cx="47" cy="37" r="4" fill="#FF6B6B" opacity="0.4" />
                <circle cx="73" cy="37" r="4" fill="#FF6B6B" opacity="0.4" />
            </svg>
        </div>

        <!-- 충돌 효과 -->
        <div class="collision-effect">
            <div style="width: 128px; height: 128px; border-radius: 9999px; background: rgba(251, 191, 36, 0.6); filter: blur(40px);"></div>
        </div>

        <!-- 충돌 반짝임 -->
        <div class="sparkle">✨</div>

        <!-- 맛집 로고 -->
        <div class="logo text-center">
            <h1 class="text-7xl font-bold text-orange-600 mb-2" style="filter: drop-shadow(0 4px 3px rgb(0 0 0 / 0.07));">
                맛집
            </h1>
            <div class="underline h-1 bg-gradient-to-r from-orange-400 via-orange-500 to-orange-400 rounded-full mx-auto"></div>
            <p class="subtitle text-xl text-orange-800 mt-4">
                최고의 맛을 찾아서
            </p>
        </div>

        <!-- 클릭 유도 -->
        <div class="click-hint">화면을 클릭하거나 잠시 기다려주세요</div>

        <!-- 배경 별 장식 -->
        <div class="star" style="left: 20%; top: 30%; animation-delay: 1s;"></div>
        <div class="star" style="left: 30%; top: 50%; animation-delay: 1.1s;"></div>
        <div class="star" style="left: 40%; top: 30%; animation-delay: 1.2s;"></div>
        <div class="star" style="left: 50%; top: 70%; animation-delay: 1.3s;"></div>
        <div class="star" style="left: 60%; top: 30%; animation-delay: 1.4s;"></div>
        <div class="star" style="left: 70%; top: 50%; animation-delay: 1.5s;"></div>
        <div class="star" style="left: 80%; top: 30%; animation-delay: 1.6s;"></div>
        <div class="star" style="left: 90%; top: 50%; animation-delay: 1.7s;"></div>
    </div>

    <script>
        function goToMain() {
            if (document.body.classList.contains('fade-out')) return;
            document.body.classList.add('fade-out');
            setTimeout(function () {
                window.location.href = './01main.html';
            }, 800);
        }

        // 애니메이션 완료 후 3.5초 뒤 자동 이동
        setTimeout(goToMain, 3500);

        // 화면 클릭 시 즉시 이동
        document.getElementById('intro-wrapper').addEventListener('click', goToMain);
    </script>
</body>
</html>
